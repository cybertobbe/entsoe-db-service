spring.application.name=entsoe-db-service
server.port=8087

# MySQL
spring.datasource.url=jdbc:mysql://192.168.0.6:3307/entsoe
spring.datasource.username=${MYSQL_USER:entsoe}
spring.datasource.password=${MYSQL_PASSWORD:entsoe}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Artemis
spring.artemis.mode=native
spring.artemis.broker-url=tcp://192.168.0.6:61616
spring.artemis.user=${ARTEMIS_USER:admin}
spring.artemis.password=${ARTEMIS_PASSWORD:admin}

# Spring Boot Admin
spring.boot.admin.client.url=http://192.168.0.6:8085
spring.boot.admin.client.instance.metadata.user.name=${SPRING_SECURITY_USER_NAME:user}
spring.boot.admin.client.instance.metadata.user.password=${SPRING_SECURITY_USER_PASSWORD:yourpassword}
spring.boot.admin.client.instance.service-base-url=http://192.168.0.6:8087

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.file.name=/app/logs/application.log

# Camel
spring.main.allow-bean-definition-overriding=true
